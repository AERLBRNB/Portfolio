<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <style>
        @font-face {
            font-family: 'Mantinia';
            src: url('Mantinia Regular.otf') format('opentype');
        }
        
        body {
            margin: 0;
            font-family: 'Mantinia', serif;
            background-image: url(https://images6.alphacoders.com/131/1311862.jpeg);
            background-size: cover;
            color: #7b90eb;
        }
        .navbar {
            background-color: #040200;
            padding: 15px 0;
            text-align: center;
            width: 100%;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar a {
            color: #3b52b7;
            text-decoration: none;
            font-weight: bold;
            margin: 0 25px;
            font-size: 16px;
        }

        .navbar a:hover {
            color: white;
        }

        .container {
            width: 90%;
            max-width: 900px;
            margin: 40px auto;
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: #001675;
            text-shadow: 0 0 10px #0958e0;
        }
        p   {
            color: #4f69e0;
        }

        .panel {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            justify-content: center;
            align-items: center;
        }

        .main {
            flex: 2;
            background: #11111179;
            border: 3px solid #7b90eb;
            padding: 50px 30px;
            border-radius: 12px;
        }

        .main h2 {
            font-size: 90px;
            color: #3b52b7;
            margin: 0;
            text-shadow: 0 0 15px #3b52b8;
        }

        .side {
            flex: 1;
            display: flex;
            margin-top: 25px;
            flex-direction: column;
            gap: 12px;
        }

        .mini {
            background: #11111179;
            border: 1px solid #333;
            padding: 18px;
            border-radius: 8px;
        }

        .mini h3 {
            color: #3b52b7;
            font-size: 32px;
            margin: 0;
        }

    </style>
</head>

<body>
<div class="navbar">
        <a href="index.html">Home </a>
        <a href="dashboard.html">Dashboard </a>
        <a href="output.html">Output</a>
</div>
<div class="container">
    <h1>Dashboard</h1>
    <div class="panel">
        <div class="main">
            <h2>0</h2>
            <p>Total Uploads    </p>
        <div class="side">
            <div class="mini">
                <h3>0</h3>
                <p>Quiz</p>
            </div>
            <div class="mini">
                <h3>0</h3>
                <p>Lab</p>
            </div>
            <div class="mini">
                <h3>0</h3>
                <p>Exam</p>
            </div>
        </div>    
        </div>
    </div>
</div>
<script>    
    function updateTime() {
        document.getElementById("time").textContent =
            new Date().toLocaleTimeString();
    }
    setInterval(updateTime, 1000);
    updateTime();
</script>
</body>
</html>
