<!DOCTYPE html>
<html lang="en">
    <head>
        <title> JavaScript Button Practice</title>
        <style>
@font-face {
    font-family: 'Mantinia';
    src: url('Mantinia Regular.otf') format('opentype');
}

body{
    font-family: 'Mantinia', serif;
    background-image: url(https://images.steamusercontent.com/ugc/2058741034012527070/6447BBA3A6F05C3292D84757A94FE296AC195278/);
    color:#ffd57b;
    background-size: cover;
    margin:20px;
}

h1{
    text-align:center;
    color:#ffd57b;
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
    background:#1118149c;

}

section{
    border:1px solid #ffd57b;
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
    background:#1118149c;
}

button{
    background:#ffd57b;
    color:#1118149c;
    border:none;
    padding:8px 12px;
    margin:5px 0;
    cursor:pointer;
    border-radius:4px;
}

input{
    padding:6px;
    margin:5px 0;
    width:200px;
}

.output{
    margin-top:8px;
    padding:8px;
    background:#1118149c;
    border:1px solid #ffd57b;
}
    </style>
    </head>
    <body>
        <h1> JavaScript Button Act </h1>
    <section>
        <h3> 1. Alert Button </h3>
        <button onclick="alert('BOMBOCLAT BISSMALLAH!!')"> Alert </button>
    </section>
    <section>
        <h3> 2. Function Button </h3>
        <button onclick="msgFunc()"> Run </button>
        <div id="out1" class="output"> Click the Button </div>
    </section>
    <section>
        <h3> 3. Change Text </h3>
        <p id="text1"> Original Text </p>
        <button onclick="changeTxt()"> Change </button>
    </section>
    <section>
        <h3> 4. Counter </h3>
        <p> Count: <span id="count1"> 0 </span></p>
        <button onclick="addCount()"> Add </button>
    </section>
    <section>
        <h3> 5. Input Name </h3>
        <input id="name1" placeholder="Enter Name">
        <button onclick="greet()"> Submit </button>
        <div id="out2" class="output"></div>
    </section>
    <section>
        <h3> 6. Age Check </h3>
        <input id="age1" type="number" placeholder="Age">
        <button onclick="check()"> Submit </button>
        <div id="out3" class="output"> Adult </div>
    </section>
    <section>
        <h3> 7. Math Operations </h3>
        <input id="n1" type="number" placeholder="A">
        <input id="n2" type="number" placeholder="B">
        <br>        
        <button onclick="add()"> Add </button>
        <button onclick="sub()"> Subtract </button>
        <button onclick="mul()"> Multiply </button>
        <div id="math" class="output"></div>
    </section>
    <section>
        <h3> 8. Toggle Light </h3>
        <div id="box" style="padding:10px;background:#3333336d;"> Off </div>
        <button onclick="toggle()"> Submit </button>
    </section>
    <section>
        <h3> 9. Loop </h3>
        <button onclick="loop()"> Generate </button>
        <button onclick="clearList()"> Clear </button>
        <ul id="list"></ul>
    </section>
    <section>
        <h3> 10. Final Demo </h3>
        <button onclick="showVar()"> Variable </button>
        <button onclick="calc()"> Compute </button>
        <input id="grade" type="number" placeholder="Score">
        <button onclick="gradeCheck()"> Grade </button>
        <button onclick="greetFinal()"> Greet </button>
        <div id="final" class="output"></div>
    </section>

    <script>
        

let count = 0;
let light = false;

function msgFunc(){
    document.getElementById("out1").innerHTML = "Function executed";
}

function changeTxt(){
    document.getElementById("text1").innerHTML =
    "Changed at " + new Date().toLocaleTimeString();
}

function addCount(){
    count++;
    document.getElementById("count1").innerHTML = count;
}

function greet(){
    let name = document.getElementById("name1").value;
    if(name === "") name = "Guest";
    document.getElementById("out2").innerHTML = "Hello " + name;
}

function check(){
    let age = document.getElementById("age1").value;
    let res = (age >= 18) ? "Adult" : "Minor";
    document.getElementById("out3").innerHTML = res;
}

function add(){
    let a = Number(document.getElementById("n1").value);
    let b = Number(document.getElementById("n2").value);
    document.getElementById("math").innerHTML = a + b;
}

function sub(){
    let a = Number(document.getElementById("n1").value);
    let b = Number(document.getElementById("n2").value);
    document.getElementById("math").innerHTML = a - b;
}

function mul(){
    let a = Number(document.getElementById("n1").value);
    let b = Number(document.getElementById("n2").value);
    document.getElementById("math").innerHTML = a * b;
}

function toggle(){
    light = !light;
    let box = document.getElementById("box");

    if(light){
        box.innerHTML = "ON";
        box.style.background = "#ffd57b";
        box.style.color = "black";
    }else{
        box.innerHTML = "OFF";
        box.style.background = "#3333336d";
        box.style.color = "#ffd57b";
    }
}

function loop(){
    let list = document.getElementById("list");
    list.innerHTML = "";
    for(let i=1;i<=5;i++){
        list.innerHTML += "<li>Item " + i + "</li>";
    }
}

function clearList(){
    document.getElementById("list").innerHTML = "";
}

function showVar(){
    document.getElementById("final").innerHTML =
    "Counter: " + count;
}

function calc(){
    let a = 10, b = 5;
    document.getElementById("final").innerHTML = a + b;
}

function gradeCheck(){
    let s = document.getElementById("grade").value;
    let g;

    if(s >= 90) g="A";
    else if(s >= 80) g="B";
    else if(s >= 70) g="C";
    else if(s >= 60) g="D";
    else g="F";

    document.getElementById("final").innerHTML = g;
}

function greetFinal(){
    let name = prompt("Enter name:");
    if(name){
        document.getElementById("final").innerHTML = "Hi " + name;
    }
}

    </script>
    </body>
    </html>
