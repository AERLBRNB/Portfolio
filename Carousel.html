<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple carousel · example</title>
    <style>
        @font-face {
            font-family: 'Mantinia';
            src: url('Mantinia Regular.otf') format('opentype');
        }
        /* just the basics — no extra decorations */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-image: url(https://images.steamusercontent.com/ugc/2058741034012528274/BA4EBC0AB54B4D48FBA2CD228937CAFDE68CABDD/);
            background-size: cover;
            font-family: 'Mantinia', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .card {
            max-width: 700px;
            width: 100%;
            background: #1118149c;
            border-radius: 2rem;
            padding: 2rem 1.5rem 2.5rem 1.5rem;
            box-shadow: 0 15px 30px #749ceb;
            text-align: center;
        }

        h2 {
            color: #f9c043;
            margin-bottom: 1.8rem;
            font-weight: 500;
            font-size: 2rem;
        }

        /* ---------- SIMPLE CAROUSEL ---------- */
        .carousel {
            display: flex;
            overflow-x: auto;
            gap: 1.2rem;
            scroll-snap-type: x mandatory;
            padding: 0.5rem 0.2rem 1.5rem 0.2rem;
            /* hide scrollbar if you want cleaner look (optional) */
            scrollbar-width: thin;
            scrollbar-color: #a58bd4 #e5d9ff;
        }

        /* for Chrome/Safari */
        .carousel::-webkit-scrollbar {
            height: 8px;
        }
        .carousel::-webkit-scrollbar-track {
            background: #e5d9ff;
            border-radius: 20px;
        }
        .carousel::-webkit-scrollbar-thumb {
            background: #a58bd4;
            border-radius: 20px;
        }

        .carousel-item {
            scroll-snap-align: start;
            flex: 0 0 auto;
            width: 220px;
            height: 150px;
            background: #3c6ed2;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            font-weight: bold;
            box-shadow: 0 8px 12px #879ecf;
            border: 3px solid #6ab7ff;
        }

        /* make images fit (if you use real images) */
        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 1.4rem;
        }
        
        .nav {
            margin-top:15px;
        }

        .nav a {
            text-decoration:none;
            background:#6b8bd2;
            color:#ffe09c;
            padding:6px 10px;
            border-radius:8px;
            margin:4px;
            font-size:14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Outer Gods</h2>

        <!-- === CAROUSEL (only HTML + CSS) === -->
        <div class="carousel">
            <!-- slide 1 (using colored divs with emoji – you can replace with <img> ) -->
            <div id="pic1" class="carousel-item"><img src="https://i.redd.it/the-depiction-of-ers-outer-god-of-night-is-interestingly-v0-r5sesohxjf6g1.png?width=1080&format=png&auto=webp&s=e4035e217302850f9d106976aebdcdfb1322fc8a"></div>
            <div id="pic2" class="carousel-item"><img src="https://goombastomp.com/wp-content/uploads/2022/09/elden-ring-malenia-phase-1-3-1024x576.webp"></div>
            <div id="pic3" class="carousel-item"><img src="https://i.redd.it/g8k4fzfplt291.jpg"></div>
            <div id="pic4" class="carousel-item"><img src="https://static0.gamerantimages.com/wordpress/wp-content/uploads/2022/04/frenzied-flame-ending-elden-ring.jpg"></div>
            <div id="pic5" class="carousel-item"><img src="https://static0.gamerantimages.com/wordpress/wp-content/uploads/2022/11/elden-ring-fire-giant-boss.jpg?q=50&fit=crop&w=825&dpr=1.5"></div>
            <div id="pic6" class="carousel-item"><img src="https://i.redd.it/t2bw2se53no91.jpg"></div>
        </div>

        <div class="nav">
            <a href="#pic1">Pic 1</a>
            <a href="#pic2">Pic 2</a>
            <a href="#pic3">Pic 3</a>
            <a href="#pic4">Pic 4</a>
            <a href="#pic5">Pic 5</a>
            <a href="#pic6">Pic 6</a>
        </div>

    </div>
</body>
</html>
